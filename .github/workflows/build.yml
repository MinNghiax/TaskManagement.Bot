name: Build & Test

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Project Structure

    steps:
      - uses: actions/checkout@v3

      - name: Check solution file
        run: |
          if [ -f "TaskManagement.Bot.sln" ]; then
            echo "✅ Solution file found"
          else
            echo "❌ Solution file not found"
            exit 1
          fi

      - name: Check project files
        run: |
          if [ -f "src/TaskManagement.Bot/TaskManagement.Bot.csproj" ]; then
            echo "✅ Main project file found"
          else
            echo "❌ Main project file not found"
            exit 1
          fi

      - name: Check test project
        run: |
          if [ -f "tests/TaskManagement.Bot.Tests/TaskManagement.Bot.Tests.csproj" ]; then
            echo "✅ Test project file found"
          else
            echo "❌ Test project file not found"
            exit 1
          fi

      - name: Validate documentation
        run: |
          files=("README.md" "docs/KIEN-TRUC.md" "docs/HUONG-DAN.md")
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file found"
            else
              echo "⚠️ $file not found"
            fi
          done

  build:
    needs: validate
    runs-on: ubuntu-latest
    name: Build Project
    continue-on-error: true

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore
        continue-on-error: true

      - name: Build
        run: dotnet build --no-restore --configuration Release
        continue-on-error: true

      - name: Run tests
        run: dotnet test --no-build --verbosity normal --configuration Release
        continue-on-error: true
